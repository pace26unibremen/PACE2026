image: ghcr.io/rikorose/gcc-cmake:gcc-13  # GCC 14+ with CMake 3.28+, C++20 ready

stages:
  - build
  - test

build-job:
  stage: build
  script:
    - gcc --version && g++ --version && cmake --version  # Verify tools
    - mkdir build/
    - cd build/
    - cmake ..
    - make -j 4
    - mkdir install
    - make DESTDIR=install install
  artifacts:
    expire_in: 1 day
    paths:
      - build/tests/ForestIOTests
      - build/tests/ForestEqualTests
      - build/tests/ForestSubforestTests
      - build/tests/DeleteEdgeActionTests

graph-representation:
  stage: test
  script:
    - cd build/tests/
    - ./ForestIOTests --reporter junit -o ForestIOTests-results.xml
    - ./ForestEqualTests --reporter junit -o ForestEqualTests-results.xml
    - ./ForestSubforestTests --reporter junit -o ForestSubforestTests-results.xml
    - ./DeleteEdgeActionTests --reporter junit -o DeleteEdgeActionTests-results.xml
  dependencies:
    - build-job
  artifacts:
    when: always
    reports:
      junit: build/tests/*-results.xml  # GitLab merges all matching files
    expire_in: 1 Month