workflow:
  rules:
    # Always run manually triggered pipelines (via UI "Run pipeline")
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always
    # Always run scheduled pipelines
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    # Skip all pipelines triggered by tags
    - if: $CI_COMMIT_TAG
      when: never
    # Skip pipelines for branches with open MRs (handled by MR pipelines, avoids duplicate pipelines)
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - when: always

# Shared anchor for reuse
.release-rules: &release-rules
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && ($FORCE_RELEASE == "true" || $MANUAL_TAG != "")'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_COMMIT_MESSAGE =~ /See merge request/'
      when: on_success
    - when: never

# All test jobs share the same configuration
.test-base:
  stage: test
  image: ubuntu:24.04
  dependencies:
    - build-solver
  artifacts:
    when: always
    reports:
      junit: build/tests/*-results.xml
    expire_in: 1 Month


stages:
  - build
  - test
  - release_prep
  - release
  - docs
  - benchmark

# C++ build and tests — build statically with musl
build-solver:
  stage: build
  image: alpine:3.20
  script:
    - apk add --no-cache cmake ninja clang musl-dev libc++-dev git file
    - mkdir -p build
    - cd build
    # Configure CMake to use clang and link statically
    - cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_EXE_LINKER_FLAGS="-static"
    - ninja
    # Check that the resulting binary is indeed statically linked
    - |
      FILE_OUT=$(file src/startSolver)
      echo "$FILE_OUT"
      if ! echo "$FILE_OUT" | grep -q 'statically linked'; then
        echo "src/startSolver is not statically linked" >&2
        exit 1
      fi
  artifacts:
    expire_in: never
    paths:
      - build/src/startSolver
      - build/tests/ForestIOTests
      - build/tests/ForestEqualTests
      - build/tests/ForestSubforestTests
      - build/tests/DeleteEdgeActionTests
      - build/tests/BranchingSolverSimpleTests
      - build/tests/PluginTests
      - build/tests/MetricsPluginTests

build-solver-windows:
  stage: build
  image: alpine:3.20
  <<: *release-rules
  script:
    - apk add --no-cache cmake ninja mingw-w64-gcc git file
    - mkdir -p build-win
    - cd build-win
    - cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_SYSTEM_NAME=Windows -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ -DCMAKE_FIND_ROOT_PATH=/usr/x86_64-w64-mingw32 -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++ -Wl,--enable-auto-import"
    - ninja
    - file src/startSolver.exe  # Should show PE32+ executable (static)
  artifacts:
    expire_in: never
    paths:
      - build-win/src/startSolver.exe

test-graph-representation:
  extends: .test-base
  before_script:
    - cd build/tests/
    - chmod +x ForestIOTests ForestEqualTests ForestSubforestTests
  script:
    - ./ForestIOTests --reporter junit -o ForestIOTests-results.xml
    - ./ForestEqualTests --reporter junit -o ForestEqualTests-results.xml
    - ./ForestSubforestTests --reporter junit -o ForestSubforestTests-results.xml

test-actions:
  extends: .test-base
  before_script:
    - cd build/tests/
    - chmod +x DeleteEdgeActionTests
  script:
    - ./DeleteEdgeActionTests --reporter junit -o DeleteEdgeActionTests-results.xml

test-branching-solver:
  extends: .test-base
  before_script:
    - cd build/tests/
    - chmod +x BranchingSolverSimpleTests
  script:
    - ./BranchingSolverSimpleTests --reporter junit -o BranchingSolverSimpleTests-results.xml

test-plugins:
  extends: .test-base
  before_script:
    - cd build/tests/
    - chmod +x PluginTests
  script:
    - ./PluginTests --reporter junit -o PluginTests-results.xml
    - ./MetricsPluginTests --reporter junit -o MetricsPluginTests-results.xml

pages:
  image: alpine:3.20
  stage: docs
  dependencies:
    # Only generate docs, if all tests passed
    - test-actions
    - test-graph-representation
    - test-branching-solver
    - test-plugins
  script:
    # Install Doxygen + Graphviz
    - apk add --no-cache doxygen graphviz ttf-freefont py3-pip
    # Generate docs
    - doxygen Doxyfile
    # Move HTML to GitLab Pages 'public/' folder
    - mkdir -p public
    - cp -r docs/html/* public/
  artifacts:
    paths:
      - public
    expire_in: 1 Month
  only:
    # Publish docs only from master branch and tags
    - master
    - tags

# Prepare version, tag name, and release description (no tag/release created here)
prepare-release:
  stage: release_prep
  image: ubuntu:24.04
  <<: *release-rules
  before_script:
    - apt-get update && apt-get install -y curl jq git
    - git fetch --tags  # Ensure we have all tags to determine the latest version
  script:
    - |
      # --- Manual TAG override: skip all version/MR logic ---
      if [ -n "$MANUAL_TAG" ]; then
        echo "Manual tag override: $MANUAL_TAG"
        TAG="$MANUAL_TAG"
        TITLE="Manual release $TAG"
        DESC_FULL="Manually triggered release."
        MR_IID=""
        ISSUE_IID=""
        LOOKUP_SHA="$CI_COMMIT_SHA"
      else
        # --- Determine which commit to look up the MR for ---
        LOOKUP_SHA="${RELEASE_COMMIT_SHA:-$CI_COMMIT_SHA}"
        echo "Looking up MR for commit: $LOOKUP_SHA"

        MR_IID=$(
          curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" \
            "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/commits/$LOOKUP_SHA/merge_requests" \
          | jq -r '.[0].iid // empty'
        )
        if [ -z "$MR_IID" ] || [ "$MR_IID" = "null" ]; then
          echo "Error: No merged MR found for commit $LOOKUP_SHA"
          exit 1
        fi
        echo "MR IID: $MR_IID"
      fi
    - |
      if [ -z "$MANUAL_TAG" ]; then
        # Get MR labels and decide bump type
        MR_DATA=$(
          curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" \
            "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$MR_IID"
        )
        echo "All labels:"
        echo "$MR_DATA" | jq -r '.labels[]'
        LABELS=$(echo "$MR_DATA" | jq -r '[.labels[] | select(test("^[Tt]ype::"))] | join(", ")')
        if [[ "$LABELS" =~ [Tt]ype::[Ff]eature ]]; then
          BUMP="minor"
        elif [[ "$LABELS" =~ [Tt]ype::([bB]ug|[Mm]aintenance|[Mm]eta[[:space:]]*[Ff]eature) ]]; then
          BUMP="patch"
        else
          echo "Error: No valid type:: label: $LABELS"
          exit 1
        fi
        echo "Labels: $LABELS → Bump: $BUMP"
      fi
    - |
      if [ -z "$MANUAL_TAG" ]; then
        # Current version from latest vX.Y.Z tag
        LATEST_TAG=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -n1)
        if [ -z "$LATEST_TAG" ]; then
          CURRENT_VERSION="0.0.0"
        else
          CURRENT_VERSION="${LATEST_TAG#v}"
        fi
        if ! [[ $CURRENT_VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
          echo "Error: Invalid semver $LATEST_TAG (manual major? Use vMAJOR.0.0)"
          exit 1
        fi
        MAJOR="${BASH_REMATCH[1]}"
        MINOR="${BASH_REMATCH[2]}"
        PATCH="${BASH_REMATCH[3]}"
        echo "Current: v$CURRENT_VERSION"

        # Compute new version
        if [ "$BUMP" = "minor" ]; then
          NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
        else
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
        fi
        TAG="v$NEW_VERSION"
        echo "New version (tag): $TAG"
      fi
    - |
      if [ -z "$MANUAL_TAG" ]; then
        # Get issue from MR (parse "Closes #123" in description)
        ISSUE_IID=$(echo "$MR_DATA" | grep -o 'Closes #[0-9]\+' | head -1 | sed 's/Closes #//')
        if [ -n "$ISSUE_IID" ]; then
          ISSUE_DATA=$(
            curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" \
              "$CI_API_V4_URL/projects/$CI_PROJECT_ID/issues/$ISSUE_IID"
          )
          ISSUE_TITLE=$(echo "$ISSUE_DATA" | jq -r '.title')
          DESC=$(
            echo "$ISSUE_DATA" \
            | jq -r '.description // empty' \
            | head -n15 \
            | sed 's/^/  /'
          )
          DESC_FULL="${DESC}

        ... (see more at $CI_PROJECT_URL/-/issues/$ISSUE_IID)"
          TITLE="$ISSUE_TITLE"
        else
          TITLE=$(echo "$MR_DATA" | jq -r '.title')
          DESC_FULL="No linked issue. See MR $CI_PROJECT_URL/-/merge_requests/$MR_IID"
        fi
        echo "Title: $TITLE"
        echo "Desc preview:"
        echo "$DESC_FULL"

        # Compose release description
        RELEASE_DESC="**MR!$MR_IID: $TITLE**  $DESC_FULL"
        echo "Release description (single line with \\n escapes):"
        echo "$RELEASE_DESC"
      fi
    - |
      # Write dotenv — TAG and the exact commit the release points to
      {
        printf 'TAG=%s\n' "$TAG"
        printf 'RELEASE_COMMIT_SHA=%s\n' "$LOOKUP_SHA"
      } > release.env
      echo "Wrote release.env: TAG=$TAG RELEASE_COMMIT_SHA=$LOOKUP_SHA"
    - |
      # Write full description as Markdown artifact
      cat > release-description.md << EOF

      This release was automatically generated from

      # ${MR_IID:+MR!$MR_IID: }$TITLE

      $DESC_FULL

      ---

      ${MR_IID:+[Full MR]($CI_PROJECT_URL/-/merge_requests/$MR_IID)  }
      ${ISSUE_IID:+[Full issue #$ISSUE_IID (if linked)]($CI_PROJECT_URL/-/issues/$ISSUE_IID)}
      EOF
  artifacts:
    reports:
      dotenv: release.env
    paths:
      - release-description.md
    expire_in: 1 hour

# Actual release job using the GitLab release keyword + official image
release-job:
  stage: release
  image: ubuntu:24.04
  needs:
    - job: prepare-release
      artifacts: true
  <<: *release-rules
  before_script:
    - apt-get update && apt-get install -y curl jq git
  script:
    - echo "TAG=$TAG RELEASE_COMMIT_SHA=$RELEASE_COMMIT_SHA"
    - |
      # Configure git to push via job token
      git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git config user.email "ci@gitlab"
      git config user.name "GitLab CI"
    - |
      # Tag the MR merge commit, not master HEAD
      git tag -a "$TAG" "$RELEASE_COMMIT_SHA" -m "Release $TAG"
      git push origin "$TAG"
    - |
      # Create the release with asset links referencing the tag as ref
      curl --fail \
           --header "JOB-TOKEN: $CI_JOB_TOKEN" \
           --header "Content-Type: application/json" \
           --data "$(jq -n \
             --arg tag "$TAG" \
             --arg name "Release $TAG" \
             --rawfile desc release-description.md \
             --arg linux_url "$CI_PROJECT_URL/-/jobs/artifacts/$TAG/raw/build/src/startSolver?job=build-solver" \
             --arg win_url "$CI_PROJECT_URL/-/jobs/artifacts/$TAG/raw/build-win/src/startSolver.exe?job=build-solver-windows" \
             '{
               tag_name: $tag,
               name: $name,
               description: $desc,
               assets: {
                 links: [
                   {name: "solver (Linux x86_64 static binary)", url: $linux_url, link_type: "package"},
                   {name: "solver (Windows x86_64 static binary)", url: $win_url, link_type: "package"}
                 ]
               }
             }')" \
           "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases"
    - echo "Release $TAG created successfully."

# Build stride from source
build_stride:
  stage: build
  image: rust:1.93
  script:
    - apt-get update && apt-get install -y musl-tools
    - rustup target add x86_64-unknown-linux-musl
    - git clone https://github.com/manpen/pace26stride.git
    - cd pace26stride
    - cargo build --profile smaller-release --target x86_64-unknown-linux-musl
  artifacts:
    expire_in: 1 day
    paths:
      - pace26stride/target/x86_64-unknown-linux-musl/smaller-release/stride

.run_stride_benchmark_template:
  stage: benchmark
  image: ubuntu:24.04
  dependencies:
    - build-solver
    - build_stride
  variables:
    RUN_BENCHMARK: "none"   # none, quick, full, exact, all
    RUN_SUFFIX: "" # Can be used on manual runs to change the run name
    INSTANCES_LST: "all.lst"  # Or full
    SLURM_SCRIPT: "quick_run.slurm"
    STRIDE_TIMEOUT: 1800
    STRIDE_GRACE: 10
    STRIDE_RUN_NAME: "${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}"
    PACE_TRACK: "pipeline"
  before_script:
    - echo "Setting up SSH for HPC access..."
    - apt-get update && apt-get install -y openssh-client rsync curl jq
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$SSH_PRIVATE_KEY" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - echo "$HPC_HOST_KEY" >> ~/.ssh/known_hosts
    - chmod 600 ~/.ssh/known_hosts
    - |
      cat > ~/.ssh/config << EOF
      Host hpc
        HostName $HPC_HOST
        User $HPC_USER
        IdentityFile ~/.ssh/id_ed25519
        StrictHostKeyChecking yes
      EOF
    - chmod 600 ~/.ssh/config
    - ssh hpc "echo 'Connected to HPC!'"
    - |
      _sfx="${RUN_SUFFIX}"
      _sfx="${_sfx#"${_sfx%%[!_]*}"}"
      [ -n "$_sfx" ] && STRIDE_RUN_NAME="${STRIDE_RUN_NAME}_${_sfx}"
      echo "Effective run name: $STRIDE_RUN_NAME"

  script:
    # Remote directory layout:
    #   ~/pace-bench/shared/.stride-downloads/  -- stride instance cache (shared, read/write)
    #   ~/pace-bench/shared/stride-logs/        -- merged logs from all runs (permanent)
    #   ~/pace-bench/shared/slurm-logs/         -- merged slurm stdout/stderr (permanent)
    #   ~/pace-bench/jobs/$CI_JOB_ID/           -- per-job staging dir (deleted after merge)

    - HPC_JOB_DIR="pace-bench/jobs/$CI_JOB_ID"
    - HPC_SHARED_DIR="pace-bench/shared"
    # Ensure all directories exist
    - ssh hpc "mkdir -p ~/$HPC_JOB_DIR ~/$HPC_SHARED_DIR/.stride-downloads ~/$HPC_SHARED_DIR/stride-logs ~/$HPC_SHARED_DIR/slurm-logs"

    # 1) Prepare and copy files to HPC
    - mkdir -p hpc_transfer
    # Prepare .env file for Stride with all necessary variables
    - |
      cat > hpc_transfer/.env <<EOF
        STRIDE_SOLVER="./startSolver"
        STRIDE_TIMEOUT=$STRIDE_TIMEOUT
        STRIDE_GRACE=$STRIDE_GRACE
        STRIDE_DOWNLOADS_PATH="../../shared/.stride-downloads"
        STRIDE_INSTANCE_ORDER="nodes-trees-asc"
        STRIDE_RUN_NAME="$STRIDE_RUN_NAME"
        STRIDE_OPTIMAL=true
        PACE_TRACK="$PACE_TRACK"
      EOF
    - cp pace26stride/target/x86_64-unknown-linux-musl/smaller-release/stride hpc_transfer/
    - cp build/src/startSolver hpc_transfer/
    - cp res/instances/"$INSTANCES_LST" hpc_transfer/instances.lst
    - cp gitlab-ci/slurm/"$SLURM_SCRIPT"  hpc_transfer/run_stride.slurm
    - cp gitlab-ci/bash/*.sh hpc_transfer/
    - tar czf hpc_payload.tgz hpc_transfer

    - scp hpc_payload.tgz hpc:~/$HPC_JOB_DIR

    # 2) Unpack, prepare, and submit job
    - ssh hpc "cd ~/$HPC_JOB_DIR && tar xzf hpc_payload.tgz --strip-components=1 && chmod +x *.sh *.slurm && rm hpc_payload.tgz"
    - |
      SLURM_JOB_ID=$(ssh hpc "
        set -e
        cd ~/\"$HPC_JOB_DIR\"
        JOB_ID=\$(sbatch --chdir=\"\$HOME/$HPC_JOB_DIR\" run_stride.slurm | awk '{print \$4}')
        echo \"\$JOB_ID\" > last_job.id
        echo \"\$JOB_ID\"
      ")
      echo "Submitted Slurm job: $SLURM_JOB_ID"

    # 3) Monitor job
    - ssh hpc "bash ~/$HPC_JOB_DIR/monitor_job.sh ~/$HPC_JOB_DIR"

    # 4) Retrieve results
    - mkdir -p stride-logs
    - JOB_DIR="~/pace-bench/jobs/$CI_JOB_ID"
    - rsync -avq --relative "hpc:$JOB_DIR/stride-logs/./*/summary.json" stride-logs/
    # Copy error logs if they exist; ignore if they don't (e.g. if the job succeeded without errors)
    - rsync -avq --relative --ignore-missing-args "hpc:$JOB_DIR/stride-logs/./*/solvererror" stride-logs/

    # 5) Resolve run folder from local rsync output
    - |
      RUN_FOLDER=$(ls -1d stride-logs/run_* 2>/dev/null | sort | tail -n1 | xargs basename)
      echo "Resolved run folder: $RUN_FOLDER"

    # 6) Merge logs
    - ssh hpc "cp -a ~/$HPC_JOB_DIR/stride-logs/. ~/$HPC_SHARED_DIR/stride-logs/"
    # Move slurm logs (named <jobname>_<slurm_job_id>.out/err via %x_%j)
    - ssh hpc "mv ~/$HPC_JOB_DIR/run_stride_* ~/$HPC_SHARED_DIR/slurm-logs/ 2>/dev/null || true"

    # 7) Remove staging directory
    - ssh hpc "rm -rf pace-bench/jobs/$CI_JOB_ID"

    # 8) Check for errors
    - bash gitlab-ci/bash/check_errors.sh stride-logs/

    # 9) Notify dashboard (best effort, don't fail the job if this fails)
    - |
      curl -X POST "$DASHBOARD_WEBHOOK_URL/api/webhook/notify" \
        -H "X-Webhook-Token: $DASHBOARD_WEBHOOK_SECRET" \
        -H "Content-Type: application/json" \
        --data "$(jq -cn \
          --arg run_name         "$RUN_FOLDER" \
          --arg commit_sha       "$CI_COMMIT_SHORT_SHA" \
          --arg branch           "$CI_COMMIT_BRANCH" \
          --arg commit_message   "$CI_COMMIT_MESSAGE" \
          --arg commit_author    "$GITLAB_USER_NAME" \
          --arg commit_timestamp "$CI_COMMIT_TIMESTAMP" \
          --arg pipeline_url     "$CI_PIPELINE_URL" \
          '{run_name:$run_name,commit_sha:$commit_sha,branch:$branch,
            commit_message:$commit_message,commit_author:$commit_author,
            commit_timestamp:$commit_timestamp,pipeline_url:$pipeline_url}')" \

  artifacts:
    when: always
    paths:
      - stride-logs/
    expire_in: 1 Month

# Quick: every commit
run_quick_benchmark:
  variables:
    INSTANCES_LST: "all.lst"
    SLURM_SCRIPT: "quick_run.slurm"
    STRIDE_TIMEOUT: 120
    STRIDE_GRACE: 5
    STRIDE_RUN_NAME: "${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}_quick"
  extends: .run_stride_benchmark_template
  rules:
    # Skip if this is a release pipeline (merge into master)
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_COMMIT_MESSAGE =~ /Merge request|See merge request/'
      when: never
    # If manually triggered from the web UI and the variable is set to quick or all, run the quick benchmark
    - if: '$CI_PIPELINE_SOURCE == "web" && ($RUN_BENCHMARK == "quick" || $RUN_BENCHMARK == "all")'
      when: on_success
    # Run on all other pipelines (branches, MRs, direct master pushes)
    - if: '$CI_PIPELINE_SOURCE != "web"'
      when: on_success
    - when: never

run_full_benchmark:
  variables:
    INSTANCES_LST: "all.lst"
    SLURM_SCRIPT: "release_run.slurm"
    STRIDE_TIMEOUT: 900
    STRIDE_GRACE: 10
    STRIDE_RUN_NAME: "${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}_full"
  extends: .run_stride_benchmark_template
  rules:
    # If manually triggered from the web UI and the variable is set to full or all, run the quick benchmark
    - if: '$CI_PIPELINE_SOURCE == "web" && ($RUN_BENCHMARK == "full" || $RUN_BENCHMARK == "all")'
      when: on_success
    - !reference [ .release-rules, rules ]
    - when: never

run_exact-track_benchmark:
  variables:
    INSTANCES_LST: "pace26_exact_pub_v2.lst"
    SLURM_SCRIPT: "release_run.slurm"
    STRIDE_TIMEOUT: 1800
    STRIDE_GRACE: 10
    STRIDE_RUN_NAME: "${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}_exact"
  extends: .run_stride_benchmark_template
  rules:
    # If manually triggered from the web UI and the variable is set to exact or all, run the quick benchmark
    - if: '$CI_PIPELINE_SOURCE == "web" && ($RUN_BENCHMARK == "exact" || $RUN_BENCHMARK == "all")'
      when: on_success
    - !reference [ .release-rules, rules ]
    - when: never