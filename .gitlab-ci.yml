stages:
  - build
  - test
  - benchmark

# C++ build and tests — build statically with musl
build-solver:
  stage: build
  # Alpine + musl + clang gives you an easy static toolchain
  image: alpine:3.20
  script:
    - apk add --no-cache cmake ninja clang musl-dev libc++-dev git file
    - mkdir -p build
    - cd build
    # Configure CMake to use clang and link statically
    - cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_EXE_LINKER_FLAGS="-static"
    - ninja
    # Check that the resulting binary is indeed statically linked
    - file src/startSolver
  artifacts:
    expire_in: 1 day
    paths:
      - build/src/startSolver
      - build/tests/ForestIOTests
      - build/tests/ForestEqualTests
      - build/tests/ForestSubforestTests
      - build/tests/DeleteEdgeActionTests

graph-representation:
  stage: test
  # Use any glibc-based image here; static binary will run anywhere
  image: ubuntu:24.04
  dependencies:
    - build-solver
  script:
    - cd build/tests
    - chmod +x ForestIOTests ForestEqualTests ForestSubforestTests DeleteEdgeActionTests
    - ./ForestIOTests
    - ./ForestEqualTests
    - ./ForestSubforestTests
    - ./DeleteEdgeActionTests

# Build stride from source
build_stride:
  stage: build
  image: rust:1.93
  script:
    - apt-get update && apt-get install -y musl-tools
    - rustup target add x86_64-unknown-linux-musl
    - git clone https://github.com/manpen/pace26stride.git
    - cd pace26stride
    - cargo build --profile smaller-release --target x86_64-unknown-linux-musl
  artifacts:
    expire_in: 1 day
    paths:
      - pace26stride/target/x86_64-unknown-linux-musl/smaller-release/stride

run_stride_benchmark:
  stage: benchmark
  image: ubuntu:24.04
  dependencies:
    - build-solver
    - build_stride
  before_script:
    - apt-get update && apt-get install -y openssh-client rsync
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh

    # SSH_PRIVATE_KEY is a file path, so copy the file
    - cp "$SSH_PRIVATE_KEY" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519

    # Set up known_hosts
    - echo "$HPC_HOST_KEY" >> ~/.ssh/known_hosts
    - chmod 600 ~/.ssh/known_hosts

    # Create SSH config with host alias
    - |
      cat > ~/.ssh/config << EOF
      Host hpc
          HostName $HPC_HOST
          User $HPC_USER
          IdentityFile ~/.ssh/id_ed25519
          StrictHostKeyChecking yes
      EOF
    - chmod 600 ~/.ssh/config
  script:
    - ssh hpc "echo 'Connected to HPC!'"

    # 1) Copy binaries, instance list and slurm script to HPC login node
    - mkdir -p hpc_transfer
    - cp pace26stride/target/x86_64-unknown-linux-musl/smaller-release/stride hpc_transfer/
    - cp build/src/startSolver hpc_transfer/
    - cp res/instances/50leaves.lst hpc_transfer/instances.lst
    - cp gitlab-ci/slurm/run_stride.slurm hpc_transfer/
    - tar czf hpc_payload.tgz hpc_transfer

    - ssh hpc "mkdir -p ~/pace-bench"
    - scp hpc_payload.tgz hpc:~/pace-bench/hpc_payload.tgz

    # 2) Remote: unpack and submit Slurm job
    - |
      ssh hpc bash <<'EOF'
        mkdir -p ~/pace-bench
        cd ~/pace-bench
      
        # Backup stride-logs if it exists, as we want to keep them over multiple runs
        if [ -d "hpc_transfer/stride-logs" ]; then
          mv hpc_transfer/stride-logs stride-logs.backup
        fi
      
        tar xzf hpc_payload.tgz
      
        # Restore stride-logs
        if [ -d "stride-logs.backup" ]; then
          mv stride-logs.backup hpc_transfer/stride-logs
        fi
      
        JOB_ID=$(sbatch hpc_transfer/run_stride.slurm | awk '{print $4}')
        echo "$JOB_ID" > last_job.id
      
        # Wait a moment for stride to create the run directory
        sleep 2
        
        # Capture the actual run directory (resolve the 'latest' symlink)
        if [ -L "hpc_transfer/stride-logs/latest" ]; then
          RUN_DIR=$(readlink -f hpc_transfer/stride-logs/latest)
          echo "$RUN_DIR" > last_run_dir.path
        fi
      EOF
    - |
      JOB_ID=$(ssh hpc "cat ~/pace-bench/last_job.id")
      echo "Slurm job submitted, job ID: $JOB_ID"
    # 3) Wait for job completion on HPC
    - |
      ssh hpc bash <<'EOF'
        cd ~/pace-bench
        JOB_ID=$(cat last_job.id)
      
        # Get the specific run directory for this job
        if [ -f "last_run_dir.path" ]; then
          RUN_DIR=$(cat last_run_dir.path)
        else
          # Fallback: wait for the directory to be created
          for i in {1..30}; do
            if [ -L "hpc_transfer/stride-logs/latest" ]; then
              RUN_DIR=$(readlink -f hpc_transfer/stride-logs/latest)
              echo "$RUN_DIR" > last_run_dir.path
              break
            fi
            sleep 1
          done
        fi
        echo "Found run directory: ${RUN_DIR} and will monitor job ${JOB_ID}"
        
        # pooling loop
        while true; do
          STATE=$(sacct -j "$JOB_ID" --format=State --noheader | head -n1 | awk '{print $1}')
          
          if [[ "$STATE" =~ ^COMPLETED ]]; then
            echo ""
            echo "Job $JOB_ID completed successfully"
            exit 0
          elif [[ "$STATE" =~ ^(FAILED|CANCELLED|TIMEOUT|NODE_FAIL|PREEMPTED|OUT_OF_MEMORY) ]]; then
            echo ""
            echo "Slurm job $JOB_ID ended with state $STATE"
            exit 1
          elif [[ "$STATE" =~ ^(PENDING|CONFIGURING) ]]; then
            # Show the reason if available
            REASON=$(squeue -j "$JOB_ID" -h -o "%r" 2>/dev/null || echo "Unknown")
            echo "Job $JOB_ID still in state $STATE (reason: $REASON) - waiting..."
            sleep 60
          elif [[ "$STATE" =~ ^RUNNING ]]; then
            # Try to show progress if stride has started producing output
            SUMMARY_FILE="${RUN_DIR}/summary.json"
            INSTANCES_FILE="hpc_transfer/instances.lst"
            
            OUTPUT="Job $JOB_ID is running..."
            
            if [ -f "$SUMMARY_FILE" ] && [ -f "$INSTANCES_FILE" ]; then
              TOTAL=$(wc -l < "$INSTANCES_FILE" 2>/dev/null | tr -d ' \n' | head -c 10)
              TOTAL=${TOTAL:-0}
              FINISHED=$(grep -c "^{" "$SUMMARY_FILE" 2>/dev/null || echo 0)
              TIMEOUTS=$(grep -c '"Timeout"' "$SUMMARY_FILE" 2>/dev/null || echo 0)
              ERRORS=$(grep -c '"SolverError"' "$SUMMARY_FILE" 2>/dev/null || echo 0)
              SOLVED=$(grep -c '"Valid"' "$SUMMARY_FILE" 2>/dev/null || echo 0)
              
              # Validate TOTAL is a number
              if [[ "$TOTAL" =~ ^[0-9]+$ ]] && [ "$TOTAL" -gt 0 ]; then
                PERCENT=$((FINISHED * 100 / TOTAL))
                OUTPUT="${OUTPUT} | Progress: ${FINISHED}/${TOTAL} (${PERCENT}%) | Solved: ${SOLVED} | Timeouts: ${TIMEOUTS} | Errors: ${ERRORS}"
                
                # Estimate time remaining (if we have enough data)
                if [ "$FINISHED" -gt 5 ]; then
                  ELAPSED=$(sacct -j "$JOB_ID" --format=ElapsedRaw --noheader 2>/dev/null | head -n1 | awk '{print $1}' | tr -d ' \n' | head -c 10)
                  ELAPSED=${ELAPSED:-0}
                  # Validate ELAPSED is a number
                  if [[ "$ELAPSED" =~ ^[0-9]+$ ]] && [ "$ELAPSED" -gt 0 ] && [ "$FINISHED" -gt 0 ]; then
                    AVG_TIME=$((ELAPSED / FINISHED))
                    REMAINING=$((TOTAL - FINISHED))
                    ETA_SECONDS=$((AVG_TIME * REMAINING))
                    ETA_HOURS=$((ETA_SECONDS / 3600))
                    ETA_MINS=$(((ETA_SECONDS % 3600) / 60))
                    ELAPSED_HOURS=$((ELAPSED / 3600))
                    ELAPSED_MINS=$(((ELAPSED % 3600) / 60))
                    OUTPUT="${OUTPUT} | Elapsed: ${ELAPSED_HOURS}h ${ELAPSED_MINS}m | ETA: ${ETA_HOURS}h ${ETA_MINS}m"
                  fi
                fi
              fi
            else 
              OUTPUT="$OUTPUT | No progress info yet"
            fi
      
            echo "$OUTPUT"
            sleep 60
          else
            echo "Unknown state: $STATE - waiting..."
            sleep 60
          fi
        done
      EOF

    # 4) Retrieve logs back to GitLab job workspace
    - mkdir -p stride-logs-hpc
    - rsync -av hpc:~/pace-bench/hpc_transfer/stride-logs/ stride-logs/
    - |
      # If there is a solvererror dir with content, fail via nonzero exit
      if [ -d "stride-logs/latest/solvererror" ] && [ -n "$(ls -A stride-logs/latest/solvererror)" ]; then
        echo "Error: solvererror non-empty."
        exit 1
      fi
  artifacts:
    paths:
      - stride-logs/
    expire_in: 1 Month
