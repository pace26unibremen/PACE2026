image: kitware/kwiver

stages:
  - build
  - test

build-job:
  stage: build
  script:
    - mkdir build/
    - cd build/
    - cmake ..
    - make -j 4
    - mkdir install
    - make DESTDIR=install install
  artifacts:
    expire_in: 1 day
    paths:
      - build/tests/ForestIOTests
      - build/tests/ForestEqualTests
      - build/tests/DeleteEdgeActionTests

graph-representation:
  stage: test
  script:
    - cd build/tests/
    - ./ForestIOTests
    - ./ForestEqualTests
    - ./DeleteEdgeActionTests

