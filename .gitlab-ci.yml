stages:
  - build
  - test
  - benchmark

# C++ build and tests — build statically with musl
build-solver:
  stage: build
  # Alpine + musl + clang gives you an easy static toolchain
  image: alpine:3.20
  script:
    - apk add --no-cache cmake ninja clang musl-dev libc++-dev git file
    - mkdir -p build
    - cd build
    # Configure CMake to use clang and link statically
    - cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_EXE_LINKER_FLAGS="-static"
    - ninja
    # Check that the resulting binary is indeed statically linked
    - file src/startSolver
  artifacts:
    expire_in: 1 day
    paths:
      - build/src/startSolver
      - build/tests/ForestIOTests
      - build/tests/ForestEqualTests
      - build/tests/ForestSubforestTests
      - build/tests/DeleteEdgeActionTests

graph-representation:
  stage: test
  # Use any glibc-based image here; static binary will run anywhere
  image: ubuntu:24.04
  dependencies:
    - build-solver
  script:
    - cd build/tests
    - chmod +x ForestIOTests ForestEqualTests ForestSubforestTests DeleteEdgeActionTests
    - ./ForestIOTests
    - ./ForestEqualTests
    - ./ForestSubforestTests
    - ./DeleteEdgeActionTests

# Build stride from source
build_stride:
  stage: build
  image: rust:1.93
  script:
    - apt-get update && apt-get install -y musl-tools
    - rustup target add x86_64-unknown-linux-musl
    - git clone https://github.com/manpen/pace26stride.git
    - cd pace26stride
    - cargo build --profile smaller-release --target x86_64-unknown-linux-musl
  artifacts:
    expire_in: 1 day
    paths:
      - pace26stride/target/x86_64-unknown-linux-musl/smaller-release/stride

run_stride_benchmark:
  stage: benchmark
  image: ubuntu:24.04
  dependencies:
    - build-solver
    - build_stride
  # Cache downloaded instances to speed up subsequent runs, since stride don't need to re-download them if they are already present in the cache
  cache:
    key: stride-downloads
    paths:
      - .stride-downloads/
  script:
    # Install wget and ca-certificates to allow stride to download instances if needed
    - apt-get update && apt-get install -y wget ca-certificates
    - cp pace26stride/target/x86_64-unknown-linux-musl/smaller-release/stride .
    - chmod +x stride
    - chmod +x build/src/startSolver
    - export STRIDE_SOLVER="build/src/startSolver"
    # Set a timeout of 30 minutes for stride operations, which is the official limit for the exact Track
    - export STRIDE_TIMEOUT=1800
    # 10 seconds of grace period to wrap up, which is also official limit for the exact Track
    - export STRIDE_GRACE=10
    - export STRIDE_DOWNLOADS_PATH=".stride-downloads"
    - mkdir -p "$STRIDE_DOWNLOADS_PATH"
    - ./stride download -i res/instances/30leaves.lst
    - ./stride run -Oo -i res/instances/30leaves.lst

    # Fail if stride-logs/latest/solvererror directory exists and is non‑empty
    - |
      if [ -d "stride-logs/latest/solvererror" ]; then
        if [ -n "$(ls -A stride-logs/latest/solvererror)" ]; then
          echo "Error: stride-logs/latest/solvererror is non‑empty, the solver encountered errors."
          exit 1
        fi
      fi
  artifacts:
    paths:
      - stride-logs/
    expire_in: 1 Month
