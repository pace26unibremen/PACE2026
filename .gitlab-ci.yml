image: kitware/kwiver

stages:
  - build
  - test

build-job:
  stage: build
  script:
    - mkdir build/
    - cd build/
    - cmake ..
    - make -j 4
    - mkdir install
    - make DESTDIR=install install
  artifacts:
    expire_in: 1 day
    paths:
      - build/tests/TreeIOTests
      - build/tests/TreeEqualTests
      - build/tests/TreeContractTests

graph-representation:
  stage: test
  script:
    - cd build/tests/
    - ./TreeIOTests
    - ./TreeEqualTests
    - ./TreeContractTests

